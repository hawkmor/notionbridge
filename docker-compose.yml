services:
  notion-bridge:
    build: .
    container_name: notion-bridge
    volumes:
      - ./.env:/app/.env
      - ./cookies.json:/app/cookies.json
      - ./synced_ids.json:/app/synced_ids.json
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    # 额外：如果您想让它每隔一小时同步一次，可以给 CMD 加一个循环
    # command: ["/bin/bash", "-c", "while true; do python app/main.py; sleep 3600; done"]
